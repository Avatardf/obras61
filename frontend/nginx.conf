server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — qualquer rota desconhecida devolve index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy: /api/* → backend Railway (rede privada)
    # Placeholders substituídos em runtime pelo docker-entrypoint.sh.
    # proxy_pass com variável força o nginx a re-resolver o DNS interno
    # a cada requisição (o IP do backend muda a cada redeploy).
    location /api/ {
        resolver RESOLVER_PLACEHOLDER valid=10s;
        set $backend_upstream BACKEND_URL_PLACEHOLDER;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    300s;
        proxy_connect_timeout  75s;
        proxy_send_timeout    300s;
    }

    # Cache agressivo para assets com hash no nome
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Compressão gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml font/truetype font/opentype
        image/svg+xml;
}
